<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>

    <!-- ── Styles ────────────────────────────────────────────────────────── -->
    <style>
      /* Basic reset & font */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f4f8;
        color: #333;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 16px;
      }

      /* Card container */
      .container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
        padding: 32px 28px;
        width: 100%;
        max-width: 520px;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 24px;
        color: #2d3748;
        text-align: center;
      }

      /* Input row */
      .input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 8px;
      }

      #task-input {
        flex: 1;
        padding: 10px 14px;
        font-size: 1rem;
        border: 2px solid #cbd5e0;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.2s;
      }

      #task-input:focus {
        border-color: #667eea;
      }

      /* Validation error message */
      #error-msg {
        color: #e53e3e;
        font-size: 0.85rem;
        margin-bottom: 16px;
        min-height: 18px;
      }

      /* Add button */
      #add-btn {
        padding: 10px 18px;
        font-size: 1rem;
        background: #667eea;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.2s;
      }

      #add-btn:hover {
        background: #5a67d8;
      }

      /* Task list */
      #task-list {
        list-style: none;
        margin-top: 8px;
      }

      /* Individual task item */
      .task-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-radius: 8px;
        background: #f7fafc;
        margin-bottom: 10px;
        border: 1px solid #e2e8f0;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Task text */
      .task-text {
        font-size: 1rem;
        word-break: break-word;
        flex: 1;
        margin-right: 12px;
      }

      /* Delete button */
      .delete-btn {
        background: #fc8181;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 0.85rem;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      .delete-btn:hover {
        background: #e53e3e;
      }

      /* Empty state */
      .empty-msg {
        text-align: center;
        color: #a0aec0;
        font-size: 0.95rem;
        padding: 20px 0;
      }
    </style>
  </head>

  <body>
    <!-- ── App container ───────────────────────────────────────────────────── -->
    <div class="container">
      <h1 aria-label="Task Manager">📝 Task Manager</h1>

      <!-- Input area: text field + Add button -->
      <div class="input-row">
        <input
          type="text"
          id="task-input"
          placeholder="Enter a new task…"
          aria-label="New task"
        />
        <button id="add-btn">Add Task</button>
      </div>

      <!-- Validation error displayed below the input -->
      <p id="error-msg" aria-live="polite"></p>

      <!-- The task list is rendered here dynamically -->
      <ul id="task-list"></ul>
    </div>

    <!-- ── JavaScript ──────────────────────────────────────────────────────── -->
    <script>
      // Base URL for all API calls (same origin as the page)
      const API_URL = '/tasks';

      // Grab references to the DOM elements we'll interact with
      const taskInput = document.getElementById('task-input');
      const addBtn    = document.getElementById('add-btn');
      const taskList  = document.getElementById('task-list');
      const errorMsg  = document.getElementById('error-msg');

      // ── Helper: clear validation error ────────────────────────────────────
      function clearError() {
        errorMsg.textContent = '';
      }

      // ── Helper: show validation error ─────────────────────────────────────
      function showError(msg) {
        errorMsg.textContent = msg;
      }

      // ── Render the task list in the DOM ────────────────────────────────────
      // Accepts an array of task objects: [{ id, text }, ...]
      function renderTasks(tasks) {
        // Clear current list
        taskList.innerHTML = '';

        if (tasks.length === 0) {
          // Show a friendly empty-state message
          taskList.innerHTML = '<li class="empty-msg">No tasks yet. Add one above!</li>';
          return;
        }

        // Create a list item for each task
        tasks.forEach((task) => {
          const li = document.createElement('li');
          li.className = 'task-item';
          li.dataset.id = task.id; // Store the task ID on the element

          // Task text span
          const span = document.createElement('span');
          span.className = 'task-text';
          span.textContent = task.text;

          // Delete button
          const btn = document.createElement('button');
          btn.className = 'delete-btn';
          btn.textContent = 'Delete';
          btn.addEventListener('click', () => deleteTask(task.id));

          li.appendChild(span);
          li.appendChild(btn);
          taskList.appendChild(li);
        });
      }

      // ── Fetch all tasks from the backend and render them ───────────────────
      async function loadTasks() {
        try {
          const response = await fetch(API_URL);
          const tasks = await response.json();
          renderTasks(tasks);
        } catch (err) {
          console.error('Failed to load tasks:', err);
        }
      }

      // ── Add a new task via POST /tasks ─────────────────────────────────────
      async function addTask() {
        clearError();
        const text = taskInput.value.trim();

        // Client-side validation: do not send an empty task
        if (text === '') {
          showError('Please enter a task before clicking Add Task.');
          taskInput.focus();
          return;
        }

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
          });

          if (!response.ok) {
            const data = await response.json();
            showError(data.error || 'Failed to add task.');
            return;
          }

          // Clear the input field and reload the task list
          taskInput.value = '';
          await loadTasks();
        } catch (err) {
          console.error('Failed to add task:', err);
        }
      }

      // ── Delete a task via DELETE /tasks/:id ────────────────────────────────
      async function deleteTask(id) {
        try {
          const response = await fetch(`${API_URL}/${id}`, {
            method: 'DELETE',
          });

          if (!response.ok) {
            const data = await response.json();
            console.error('Failed to delete task:', data.error);
            return;
          }

          // Reload the task list to reflect the deletion
          await loadTasks();
        } catch (err) {
          console.error('Failed to delete task:', err);
        }
      }

      // ── Event listeners ────────────────────────────────────────────────────

      // Click the "Add Task" button
      addBtn.addEventListener('click', addTask);

      // Press Enter inside the input field
      taskInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          addTask();
        }
      });

      // Clear the error message whenever the user starts typing
      taskInput.addEventListener('input', clearError);

      // ── Initialise: load existing tasks when the page first loads ──────────
      loadTasks();
    </script>
  </body>
</html>
